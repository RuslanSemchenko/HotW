name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    # НОВЫЙ ШАГ: Установка зависимостей
    - name: Install dependencies
      run: |
        sudo apt-get update
        # Устанавливаем необходимые пакеты разработки (dev-пакеты)
        sudo apt-get install -y libopus-dev libopusfile-dev libcurl4-openssl-dev libsdl2-dev libspeex-dev libspeexdsp-dev libvorbis-dev libopenal-dev libfreetype-dev
    
    # Существующий шаг
    - name: make
      run: make
      
    - name: make check
      run: make check
      
    - name: make distcheck
      run: make distcheck
